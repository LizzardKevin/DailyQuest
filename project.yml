name: DailyIntent
options:
  bundleIdPrefix: com.dailyintent
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: DailyIntent/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.dailyintent.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  DailyIntent:
    type: application
    platform: iOS
    sources:
      - path: DailyIntent
        excludes:
          - "Config/Config.example.xcconfig"
    resources:
      - path: DailyIntent/Resources
    settings:
      base:
        PRODUCT_NAME: DailyIntent
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: DailyIntent/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: 每日任务
