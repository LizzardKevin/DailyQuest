name: DailyQuest
options:
  bundleIdPrefix: com.dailyquest
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: DailyQuest/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.dailyquest.app
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  DailyQuest:
    type: application
    platform: iOS
    sources:
      - path: DailyQuest
        excludes:
          - "Config/Config.example.xcconfig"
    resources:
      - path: DailyQuest/Resources
    settings:
      base:
        PRODUCT_NAME: DailyQuest
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    info:
      path: DailyQuest/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: DailyQuest
